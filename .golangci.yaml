# https://golangci-lint.run/docs/linters/configuration/
version: "2"
run:
  concurrency: 1
  go: 1.26.0
  allow-parallel-runners: false
  allow-serial-runners: true
linters:
  default: none
  enable:
  - asciicheck
  - bodyclose
  - copyloopvar
  - depguard
  - dogsled
  - errcheck
  - errorlint
  - goconst
  - gocritic
  - gocyclo
  - goprintffuncname
  - govet
  - importas
  - ineffassign
  - misspell
  - nakedret
  - nilerr
  - nolintlint
  - prealloc
  - revive
  - staticcheck
  - unconvert
  - unparam
  - unused
  - usestdlibvars
  - whitespace
  settings:
    depguard:
      rules:
        main:
          deny:
          - pkg: io/ioutil
            desc: please see https://go.dev/doc/go1.16#ioutil
          - pkg: k8s.io/klog/v2
            desc: please use `sigs.k8s.io/kwok/pkg/log` instead
          - pkg: k8s.io/klog
            desc: please use `sigs.k8s.io/kwok/pkg/log` instead
          - pkg: golang.org/x/exp/slog
            desc: please use `sigs.k8s.io/kwok/pkg/log` instead
          - pkg: log/slog
            desc: please use `sigs.k8s.io/kwok/pkg/log` instead
          - pkg: log
            desc: please use `sigs.k8s.io/kwok/pkg/log` instead
          - pkg: k8s.io/apimachinery/pkg/util/yaml
            desc: please use `sigs.k8s.io/kwok/pkg/utils/yaml` instead
          - pkg: sigs.k8s.io/yaml
            desc: please use `sigs.k8s.io/kwok/pkg/utils/yaml` instead
          - pkg: k8s.io/apimachinery/pkg/util/wait
            desc: please use `sigs.k8s.io/kwok/pkg/utils/wait` instead
          - pkg: k8s.io/utils/strings/slices
            desc: please use `sigs.k8s.io/kwok/pkg/utils/slices` instead
    goconst:
      match-constant: false
      min-len: 5
      min-occurrences: 10
    gocyclo:
      min-complexity: 35
    importas:
      alias:
      - pkg: k8s.io/api/core/v1
        alias: corev1
      - pkg: k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1
        alias: apiextensionsv1
      - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
        alias: metav1
      - pkg: k8s.io/apimachinery/pkg/api/errors
        alias: apierrors
      - pkg: sigs.k8s.io/kwok/pkg/utils/slices
        alias: utilsslices
      - pkg: sigs.k8s.io/kwok/pkg/utils/maps
        alias: utilsmaps
      - pkg: sigs.k8s.io/kwok/pkg/utils/path
        alias: utilspath
      - pkg: sigs.k8s.io/kwok/pkg/utils/exec
        alias: utilsexec
      - pkg: sigs.k8s.io/kwok/pkg/utils/net
        alias: utilsnet
      no-unaliased: true
    revive:
      rules:
      - name: exported
        arguments:
        - disableStutteringCheck
    staticcheck:
      checks:
      - all
      - -ST1003
  exclusions:
    generated: lax
    rules:
    - linters:
      - goconst
      path: (.+)_test\.go
    - linters:
      - staticcheck
      path: (pkg/apis/internalversion/conversion\.go|pkg/config/vars\.go|pkg/kwok/cmd/root\.go|pkg/kwokctl/cmd/create/cluster/cluster\.go|pkg/kwokctl/runtime/cluster\.go)
      text: 'SA1019: '
    paths:
    - .*\.zz_generated\..*
    - (.+)_test\.go$
    - test/.*
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
  - gci
  - gofmt
  - goimports
  settings:
    gci:
      sections:
      - standard
      - default
      - prefix(sigs.k8s.io/kwok)
      - blank
      - dot
      custom-order: true
  exclusions:
    generated: lax
    paths:
    - .*\.zz_generated\..*
