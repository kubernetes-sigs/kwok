---
apiVersion: config.kwok.x-k8s.io/v1alpha1
kind: KwokctlResource
metadata:
  name: deployment
parameters:
  replicas: 1
  containers:
  - name: container-0
    image: busybox
template: |-
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: {{ Name }}
    namespace: {{ or Namespace "default" }}
  spec:
    replicas: {{ .replicas }}
    selector:
      matchLabels:
        app: {{ Name }}
    template:
      metadata:
        labels:
          app: {{ Name }}
      spec:
        containers:
        {{ range $index, $container := .containers }}
        - name: {{ $container.name }}
          image: {{ $container.image }}
        {{ end }}
