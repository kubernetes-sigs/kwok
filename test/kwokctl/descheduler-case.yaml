apiVersion: v1
kind: Pod
metadata:
  name: descheduler-trigger-a
  labels:
    anchor: descheduler-trigger
    app: trigger-a
spec:
  containers:
  - name: pause
    image: registry.k8s.io/pause:3.10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: descheduler-trigger-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trigger-b
  template:
    metadata:
      labels:
        anchor: descheduler-trigger
        app: trigger-b
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                anchor: descheduler-trigger
            topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: trigger-violation
            topologyKey: kubernetes.io/hostname
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.10
